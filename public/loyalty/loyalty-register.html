<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friez n Burgz | Loyalty Register</title>
    <link rel="stylesheet" href="loyalty.css"> 
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@800;900&family=Futura:wght@400&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
</head>
<body>
    
    <div class="auth-container" style="display: flex;">
        <div id="registration-form-container" class="auth-card">
            <img src="../assets/logo.png" alt="Friez n Burgz Logo" class="auth-logo">
            <h2 class="auth-title">Join Our Loyalty Program!</h2>
            <p class="form-intro">Sign up to start collecting stamps for free burgers!</p>
            
            <form id="profile-form">
                <div class="form-group">
                    <label for="fullName">Your Full Name</label>
                    <input type="text" id="fullName" class="auth-input" required autocomplete="name">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="auth-input" required autocomplete="email">
                </div>
                
                <div class="form-group">
                    <label for="password">Create a Password</label>
                    <input type="password" id="password" class="auth-input" required autocomplete="new-password">
                    <p class="form-hint">Minimum 6 characters.</p>
                </div>

                <button type="submit" id="submitProfileBtn" class="auth-button">Create My Loyalty Account</button>
                <p id="form-message" class="auth-message"></p>
                 <hr style="border: 0; border-top: 1px solid var(--salmon); margin: 20px 0;">
                <a href="loyalty-login.html" class="form-hint" style="text-align:center; display: block; font-size: 14px; color: var(--dim-grey);">Already have an account? Login here.</a>
            </form>
        </div>
    </div>

    <!-- Firebase SDKs - Compat versions -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-functions-compat.js"></script>
    
    <script type="module">
        import { db, auth } from './firebase-loyalty-config.js';

        const profileForm = document.getElementById('profile-form');
        const formMessage = document.getElementById('form-message');
        const submitBtn = document.getElementById('submitProfileBtn');

        // Handle form submission
        profileForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating Account...';
            formMessage.textContent = '';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const fullName = document.getElementById('fullName').value.trim();

            if (!fullName || !email || !password) {
                formMessage.textContent = 'Please fill out all fields.';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create My Loyalty Account';
                return;
            }

            if (password.length < 6) {
                formMessage.textContent = 'Password must be at least 6 characters long.';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create My Loyalty Account';
                return;
            }

            try {
                // Step 1: Create the user in Firebase Authentication
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;

                // Step 2: Create their loyalty card document in Firestore
                // Default program ID from your import script 'standard_stamps'
                const initialLoyaltyCardData = {
                    activeProgramId: 'standard_stamps',
                    currentStamps: 0,
                    stamps: [],
                    rewardUnlocked: false,
                    rewardCode: null,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    fullName: fullName, // Store name with the card
                    email: email
                };
                await db.collection('loyaltyCards').doc(user.uid).set(initialLoyaltyCardData);

                formMessage.style.color = 'var(--success-green)';
                formMessage.textContent = 'Account created! Redirecting to login...';

                // Redirect to the login page after a short delay
                setTimeout(() => {
                    window.location.href = 'loyalty-login.html';
                }, 2000);

            } catch (error) {
                console.error("Error creating loyalty account:", error);
                formMessage.style.color = 'var(--red)';
                if (error.code === 'auth/email-already-in-use') {
                    formMessage.textContent = 'This email address is already registered. Please log in instead.';
                } else {
                    formMessage.textContent = `Could not create account: ${error.message}`;
                }
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create My Loyalty Account';
            }
        });
    </script>
</body>
</html>
