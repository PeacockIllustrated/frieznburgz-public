<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friez n Burgz | Loyalty Login</title>
    <link rel="stylesheet" href="loyalty.css"> 
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@800;900&family=Futura:wght@400&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
</head>
<body>
    
    <div class="auth-container" id="authContainer" style="display: flex;">
        <div class="auth-card">
            <img src="../assets/logo.png" alt="Friez n Burgz Logo" class="auth-logo">
            <h2 class="auth-title">Loyalty Login</h2>
            
            <p class="form-intro" style="font-size: 16px; color: var(--dim-grey); margin-bottom: 20px;">Access your loyalty card.</p>

<!-- loyalty-login.html (After) -->
<form id="login-form">
    <input type="email" id="loginEmail" placeholder="Email" class="auth-input" autocomplete="email">
    <input type="password" id="loginPassword" placeholder="Password" class="auth-input" autocomplete="current-password">
    <button type="submit" id="loginBtn" class="auth-button email-login-btn">Login</button>
</form>
            
            <div class="divider">OR</div>
            <button id="googleLoginBtn" class="auth-button google-login-btn">
                <i class="fab fa-google"></i> Sign in with Google
            </button>
            
            <p id="authMessage" class="auth-message"></p>
            
            <hr style="border: 0; border-top: 1px solid var(--salmon); margin: 25px 0;">
            
            <p class="form-hint" style="text-align:center; font-size: 14px; color: var(--dim-grey); margin-bottom: 10px;">New to the Friez n Burgz loyalty?</p>
            <a href="loyalty-register.html" id="registerBtn" class="auth-button secondary-btn">Create Loyalty Account</a>

        </div>
    </div>

    <!-- Firebase SDKs - Compat versions -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-functions-compat.js"></script>
    
    <script type="module">
        import { auth, db } from './firebase-loyalty-config.js';

        // DOM Elements
        const loginEmail = document.getElementById('loginEmail');
        const loginPassword = document.getElementById('loginPassword');
        const loginBtn = document.getElementById('loginBtn');
        const googleLoginBtn = document.getElementById('googleLoginBtn');
        const authMessage = document.getElementById('authMessage');

        // Function to handle successful login
        const onLoginSuccess = async (user) => {
            // Check if a loyalty card document exists for this user. If not, create a placeholder.
            const loyaltyCardRef = db.collection('loyaltyCards').doc(user.uid);
            const doc = await loyaltyCardRef.get();
            if (!doc.exists) {
                await loyaltyCardRef.set({
                    activeProgramId: 'standard_stamps', // Default program ID from your import script
                    currentStamps: 0,
                    stamps: [],
                    rewardUnlocked: false,
                    rewardCode: null,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                console.log("Initialized new loyalty card for user:", user.uid);
            }
            window.location.href = 'loyalty.html'; 
        };

        // Email/Password Login Handler
        const handleEmailLogin = async () => {
            const email = loginEmail.value;
            const password = loginPassword.value;
            if (!email || !password) {
                authMessage.textContent = 'Please enter both email and password.';
                return;
            }
            try {
                authMessage.textContent = ''; // Clear previous messages
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                await onLoginSuccess(userCredential.user);
            } catch (error) {
                authMessage.textContent = `Login failed: ${error.message}`;
            }
        };

        // Google Sign-In Handler
        const handleGoogleLogin = async () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                authMessage.textContent = ''; // Clear previous messages
                const userCredential = await auth.signInWithPopup(provider);
                await onLoginSuccess(userCredential.user);
            } catch (error) {
                authMessage.textContent = `Google Sign-in failed: ${error.message}`;
            }
        };
        
        // Attach Event Listeners
        document.getElementById('login-form').addEventListener('submit', (event) => {
    event.preventDefault(); // Prevent the form from reloading the page
    handleEmailLogin();
        googleLoginBtn.addEventListener('click', handleGoogleLogin);
        
        // Also allow login by pressing Enter in the password field
        loginPassword.addEventListener('keyup', (event) => {
            if (event.key === 'Enter') {
                handleEmailLogin();
            }
        });
    </script>
</body>
</html>
