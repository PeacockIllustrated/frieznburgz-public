<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friez n Burgz | Staff Training</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@800;900&family=Futura:wght@400&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loading-spinner" class="loading-container"><div class="spinner"></div></div>

    <div id="login-prompt" class="login-prompt-container" style="display: none;">
        <div class="login-card">
            <img src="../assets/logo.png" alt="Friez n Burgz Logo" class="login-logo">
            <h2 class="login-title">Staff Training Portal</h2>
            <p>You must be logged in to access this content.</p>
            <a href="login.html" class="login-button">Proceed to Login</a>
        </div>
    </div>
    
    <div id="main-content-wrapper" style="display: none;">
        <div class="main-dashboard-container">
            <header class="dashboard-header">
                <div class="header-left"><img src="../assets/logo.png" alt="Friez n Burgz Logo" class="header-logo"><span class="app-name">Staff Training</span></div>
                <div class="header-center"><span class="current-location-display">Front Staff Handbook</span></div>
                <div class="header-right"><a href="quiz.html" class="join-team-btn">Take The Quiz</a></div>
            </header>
            <aside class="dashboard-sidebar">
                <nav class="sidebar-nav"></nav>
            </aside>
            <main id="handbook-content-main" class="dashboard-content"></main>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <!-- FIX: ADDED THE MISSING FIRESTORE SCRIPT -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    
    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="training-auth.js"></script>
    <script type="module" src="script.js"></script>

</body>
</html>
