<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friez n Burgz | Staff Training Login</title>
    <link rel="stylesheet" href="../style.css"> 
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@800;900&family=Futura:wght@400&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
</head>
<body>
    
    <div id="loading-spinner" class="loading-container" style="display: flex;"><div class="spinner"></div></div>

    <div class="auth-container" id="authContainer" style="display: none;">
        <div class="auth-card">
            <img src="../assets/logo-alt.png" alt="Friez n Burgz Logo" class="auth-logo">
            <h2 class="auth-title">Staff Training Login</h2>
            <p class="form-intro" style="font-size: 16px; color: var(--dim-grey); margin-bottom: 20px;">Please sign in with your employee account.</p>
            <input type="email" id="loginEmail" placeholder="Email" class="auth-input">
            <input type="password" id="loginPassword" placeholder="Password" class="auth-input">
            <button id="loginBtn" class="auth-button email-login-btn">Login</button>
            <div class="divider">OR</div>
            <button id="googleLoginBtn" class="auth-button google-login-btn"><i class="fab fa-google"></i> Sign in with Google</button>
            <p id="authMessage" class="auth-message"></p>
            <hr style="border: 0; border-top: 1px solid var(--salmon); margin: 20px 0;">
            <p class="form-hint" style="text-align:center; font-size: 12px; color: var(--salmon); font-style: italic;">First time logging in? Your account will be created automatically.</p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <!-- FIX: ADDED THE MISSING FIRESTORE SCRIPT -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    
    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="training-auth.js"></script>
</body>
</html>
