<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friez n Burgz | Staff Training Login</title>
    <!-- We will use the main project's style.css for consistency -->
    <link rel="stylesheet" href="../style.css"> 
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@800;900&family=Futura:wght@400&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
</head>
<body>
    
    <!-- This structure is a direct copy of your main login page for visual consistency -->
    <div class="auth-container" id="authContainer" style="display: flex;">
        <div class="auth-card">
            <img src="assets/logo-alt.png" alt="Friez n Burgz Logo" class="auth-logo">
            <h2 class="auth-title">Staff Training Login</h2>
            <input type="email" id="loginEmail" placeholder="Email" class="auth-input">
            <input type="password" id="loginPassword" placeholder="Password" class="auth-input">
            <button id="loginBtn" class="auth-button email-login-btn">Login with Email</button>
            <div class="divider">OR</div>
            <button id="googleLoginBtn" class="auth-button google-login-btn">
                <i class="fab fa-google"></i> Sign in with Google
            </button>
            <p id="authMessage" class="auth-message"></p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    
    <!-- A dedicated script to handle only the login logic and redirection -->
    <script type="module">
        import { firebaseConfig } from './firebase-config.js';

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();

        // DOM Elements
        const loginEmail = document.getElementById('loginEmail');
        const loginPassword = document.getElementById('loginPassword');
        const loginBtn = document.getElementById('loginBtn');
        const googleLoginBtn = document.getElementById('googleLoginBtn');
        const authMessage = document.getElementById('authMessage');

        // Function to handle successful login
        const onLoginSuccess = () => {
            // Redirect to the training handbook page
            window.location.href = 'index.html'; 
        };

        // Email/Password Login Handler
        const handleEmailLogin = async () => {
            const email = loginEmail.value;
            const password = loginPassword.value;
            if (!email || !password) {
                authMessage.textContent = 'Please enter both email and password.';
                return;
            }
            try {
                await auth.signInWithEmailAndPassword(email, password);
                onLoginSuccess();
            } catch (error) {
                authMessage.textContent = `Login failed: ${error.message}`;
            }
        };

        // Google Sign-In Handler
        const handleGoogleLogin = async () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                await auth.signInWithPopup(provider);
                onLoginSuccess();
            } catch (error) {
                authMessage.textContent = `Google Sign-in failed: ${error.message}`;
            }
        };
        
        // Attach Event Listeners
        loginBtn.addEventListener('click', handleEmailLogin);
        googleLoginBtn.addEventListener('click', handleGoogleLogin);

        // Check if user is already logged in, if so, redirect them immediately
        auth.onAuthStateChanged(user => {
            if (user) {
                console.log("User already signed in, redirecting to training...");
                onLoginSuccess();
            }
        });
    </script>
</body>
</html>
