<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friez n Burgz | Staff Training Login</title>
    <!-- Re-using main styles for consistency -->
    <link rel="stylesheet" href="../style.css"> 
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@800;900&family=Futura:wght@400&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
</head>
<body>
    
    <div class="auth-container" id="authContainer" style="display: flex;">
        <div class="auth-card">
            <img src="../assets/logo-alt.png" alt="Friez n Burgz Logo" class="auth-logo">
            <h2 class="auth-title">Staff Training Login</h2>
            
            <p class="form-intro" style="font-size: 16px; color: var(--dim-grey); margin-bottom: 20px;">Please sign in with your employee account.</p>

            <input type="email" id="loginEmail" placeholder="Email" class="auth-input">
            <input type="password" id="loginPassword" placeholder="Password" class="auth-input">
            <button id="loginBtn" class="auth-button email-login-btn">Login</button>
            <div class="divider">OR</div>
            <button id="googleLoginBtn" class="auth-button google-login-btn">
                <i class="fab fa-google"></i> Sign in with Google
            </button>
            
            <p id="authMessage" class="auth-message"></p>
            
            <hr style="border: 0; border-top: 1px solid var(--salmon); margin: 25px 0;">
            
            <p class="form-hint" style="text-align:center; font-size: 14px; color: var(--dim-grey); margin-bottom: 10px;">New to the team?</p>
            <a href="register-profile.html" id="registerBtn" class="auth-button secondary-btn">Create Your Profile</a>

        </div>
    </div>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    
    <script type="module">
        import { auth } from './firebase-config.js';

        // DOM Elements
        const loginEmail = document.getElementById('loginEmail');
        const loginPassword = document.getElementById('loginPassword');
        const loginBtn = document.getElementById('loginBtn');
        const googleLoginBtn = document.getElementById('googleLoginBtn');
        const authMessage = document.getElementById('authMessage');

        // Function to handle successful login
        const onLoginSuccess = () => {
            // After a successful login, always redirect to the main handbook page.
            // The auth script on that page will handle routing them correctly.
            window.location.href = 'index.html'; 
        };

        // Email/Password Login Handler
        const handleEmailLogin = async () => {
            const email = loginEmail.value;
            const password = loginPassword.value;
            if (!email || !password) {
                authMessage.textContent = 'Please enter both email and password.';
                return;
            }
            try {
                authMessage.textContent = ''; // Clear previous messages
                await auth.signInWithEmailAndPassword(email, password);
                onLoginSuccess();
            } catch (error) {
                authMessage.textContent = `Login failed: ${error.message}`;
            }
        };

        // Google Sign-In Handler
        const handleGoogleLogin = async () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                authMessage.textContent = ''; // Clear previous messages
                await auth.signInWithPopup(provider);
                onLoginSuccess();
            } catch (error) {
                authMessage.textContent = `Google Sign-in failed: ${error.message}`;
            }
        };
        
        // Attach Event Listeners
        loginBtn.addEventListener('click', handleEmailLogin);
        googleLoginBtn.addEventListener('click', handleGoogleLogin);
        
        // Also allow login by pressing Enter in the password field
        loginPassword.addEventListener('keyup', (event) => {
            if (event.key === 'Enter') {
                handleEmailLogin();
            }
        });

    </script>
</body>
</html>
