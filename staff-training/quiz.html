<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friez n Burgz | Training Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@800;900&family=Futura:wght@400&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <!-- Note: Using ../style.css to keep header/sidebar consistent with admin panel -->
    <link rel="stylesheet" href="style.css"> 
    <link rel="stylesheet" href="quiz.css">
</head>
<body>

    <div id="loading-spinner" class="loading-container"><div class="spinner"></div></div>

    <div id="login-prompt" class="login-prompt-container" style="display: none;">
        <div class="login-card">
            <img src="../assets/logo.png" alt="Friez n Burgz Logo" class="login-logo">
            <h2 class="login-title">Training Quiz</h2>
            <p>You must be logged in to view your progress and take the quiz.</p>
            <a href="login.html" class="login-button">Proceed to Login</a>
        </div>
    </div>

    <div id="main-content-wrapper" style="display: none;">
        <div class="main-dashboard-container">
            <header class="dashboard-header">
                <div class="header-left">
                    <img src="../assets/logo.png" alt="Friez n Burgz Logo" class="header-logo">
                    <span class="app-name">Quiz & Overview</span>
                </div>
                <div class="header-center">
                    <span class="current-location-display">Test Your Knowledge</span>
                </div>
                <div class="header-right">
                    <a href="index.html" class="header-button">Return to Handbook</a>
                </div>
            </header>
            <aside class="dashboard-sidebar">
                <nav class="sidebar-nav">
                    <a href="index.html" class="nav-item">
                        <i class="fas fa-book-open"></i> Return to Handbook
                    </a>
                </nav>
            </aside>
            <main class="dashboard-content">
                <div id="quiz-container">
                    <!-- Quiz content will be injected here by quiz.js -->
                </div>
            </main>
        </div>
    </div>
    
    <!-- NEW: Mobile Bottom Bar -->
    <div class="mobile-bottom-bar">
        <a href="index.html" class="mobile-quiz-link">
            <i class="fas fa-book-open"></i>
            <span>Return to Handbook</span>
        </a>
    </div>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="training-auth.js"></script>
    <script type="module" src="quiz.js"></script>
    
</body>
</html>
