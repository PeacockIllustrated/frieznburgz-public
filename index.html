<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friez n Burgz | Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@800;900&family=Futura:wght@400&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Firebase SDKs - Compat versions for easier integration with older patterns -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
</head>
<body>
    <!-- 1. Authentication Container (Login/Signup) -->
    <div class="auth-container" id="authContainer">
        <div class="auth-card">
            <img src="assets/logo-alt.png" alt="Friez n Burgz Logo" class="auth-logo">
            <h2 class="auth-title">Employee Login</h2>
            <input type="email" id="loginEmail" placeholder="Email" class="auth-input">
            <input type="password" id="loginPassword" placeholder="Password" class="auth-input">
            <button id="loginBtn" class="auth-button email-login-btn">Login with Email</button>
            <div class="divider">OR</div>
            <button id="googleLoginBtn" class="auth-button google-login-btn">
                <i class="fab fa-google"></i> Sign in with Google
            </button>
            <p id="authMessage" class="auth-message"></p>
        </div>
    </div>

    <!-- 2. Location Selection Container (Shown after login, before main app) -->
    <div class="location-selection-container" id="locationSelectionContainer">
        <div class="location-selection-card">
            <img src="assets/logo-alt.png" alt="Friez n Burgz Logo" class="auth-logo">
            <h2 class="auth-title">Select Your Location</h2>
            <div class="select-wrapper">
                <select id="locationSelect" class="location-select"></select>
                <i class="fas fa-chevron-down select-arrow"></i>
            </div>
            <button id="confirmLocationBtn" class="auth-button">Confirm Location</button>
            <p id="locationMessage" class="auth-message"></p>
        </div>
    </div>

    <!-- 3. Main Admin Dashboard Container (Shown after location selection) -->
    <div class="main-dashboard-container" id="mainDashboardContainer">
        <header class="dashboard-header">
            <div class="header-left">
                <img src="assets/logo.png" alt="Friez n Burgz Logo" class="header-logo">
                <span class="app-name">Admin Dashboard</span>
            </div>
            <div class="header-center">
                <span id="currentLocationDisplay" class="current-location-display">Location: Not Selected</span>
            </div>
            <div class="header-right">
                <button id="changeLocationBtn" class="header-button">Change Location</button>
                <button id="logoutBtn" class="header-button">Logout</button>
            </div>
        </header>

        <aside class="dashboard-sidebar">
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-page="dashboard">
                    <i class="fas fa-chart-line"></i> Dashboard
                </a>
                <a href="#" class="nav-item" data-page="stock-management">
                    <i class="fas fa-boxes"></i> Stock Management
                </a>
                <!-- NEW: Staff Nav Item Added -->
                <a href="#" class="nav-item" data-page="staff">
                    <i class="fas fa-id-card"></i> Staff
                </a>
                <a href="#" class="nav-item" data-page="wastage-log">
                    <i class="fas fa-dumpster"></i> Wastage Log
                </a>
                <a href="#" class="nav-item" data-page="orders">
                    <i class="fas fa-shipping-fast"></i> Orders
                </a>
                <a href="#" class="nav-item" data-page="suppliers">
                    <i class="fas fa-handshake"></i> Suppliers
                </a>
                <a href="#" class="nav-item" data-page="settings">
                    <i class="fas fa-cog"></i> Settings
                </a>
            </nav>
        </aside>

        <main class="dashboard-content" id="dashboardContent">
            <!-- Content will be dynamically loaded here by other modules -->
            <section id="dashboardPage" class="content-page active-page">
                <!-- Dynamic content for dashboard overview will go here -->
            </section>

            <section id="stockManagementPage" class="content-page">
                <!-- IMPORTANT: This div is where stock.js will inject its content -->
                <div id="stockManagementContent"></div>
            </section>
            
            <!-- NEW: Staff Page Section Added -->
            <section id="staffPage" class="content-page">
                <!-- IMPORTANT: This div is where staff.js will inject its content -->
                <div id="staffContent"></div>
            </section>

            <section id="wastageLogPage" class="content-page">
                <!-- IMPORTANT: This div is where wastage.js will inject its content -->
                <div id="wastageLogContent"></div>
            </section>

            <section id="ordersPage" class="content-page">
                <!-- IMPORTANT: This div is where orders.js will inject its content -->
                <div id="ordersContent"></div>
            </section>

            <section id="suppliersPage" class="content-page">
                <!-- IMPORTANT: This div is where suppliers.js will inject its content -->
                <div id="suppliersContent"></div>
            </section>

            <section id="settingsPage" class="content-page">
                <h2 class="page-title">Settings</h2>
                <p>App settings and user management.</p>
            </section>
        </main>
    </div>

    <!-- 4. Universal Modal Structure -->
    <div id="universalModal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-button">×</span>
            <h3 id="modalTitle" class="modal-title"></h3>
            <div id="modalBody" class="modal-body">
                <!-- Dynamic content will be injected here -->
            </div>
            <p id="modalMessage" class="modal-message"></p>
            <div id="modalFooter" class="modal-footer">
                <!-- Dynamic buttons/actions -->
            </div>
        </div>
    </div>

    <!-- Main JavaScript file - acts as the orchestrator -->
    <script type="module" src="main.js"></script>
</body>
</html>
