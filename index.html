<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friez n Burgz | Stock App</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@800;900&family=Futura:wght@400&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons (replace with custom SVG if preferred) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="auth-container" id="authContainer">
        <div class="auth-card">
            <img src="assets/logo.png" alt="Friez n Burgz Logo" class="auth-logo">
            <h2 class="auth-title">Employee Login</h2>
            <input type="email" id="loginEmail" placeholder="Email" class="auth-input">
            <input type="password" id="loginPassword" placeholder="Password" class="auth-input">
            <button id="loginBtn" class="auth-button email-login-btn">Login with Email</button>
            <div class="divider">OR</div>
            <button id="googleLoginBtn" class="auth-button google-login-btn">
                <i class="fab fa-google"></i> Sign in with Google
            </button>
            <p id="authMessage" class="auth-message"></p>
        </div>
    </div>

    <div class="main-app-container" id="mainAppContainer" style="display: none;">
        <header class="app-header">
            <img src="assets/logo.png" alt="Friez n Burgz Logo" class="app-logo">
            <h1 class="app-title">Stock Adjusting and Ordering</h1>
        </header>

        <main class="content-wrapper">
            <section class="stock-section">
                <div class="category-card" id="meatCategory">
                    <div class="category-header">
                        <h2 class="category-title">Meat</h2>
                        <i class="fas fa-edit edit-icon"></i>
                    </div>
                    <div class="item-list" id="meatItemList">
                        <!-- Meat items will be dynamically loaded here -->
                    </div>
                </div>

                <div class="category-card" id="cheesesCategory">
                    <div class="category-header">
                        <h2 class="category-title">Cheeses</h2>
                        <i class="fas fa-edit edit-icon"></i>
                    </div>
                    <div class="item-list" id="cheesesItemList">
                        <!-- Cheese items will be dynamically loaded here -->
                    </div>
                </div>

                <!-- New categories for Specials, Filletz, Milkshakes of the week -->
                <div class="category-card" id="specialsCategory">
                    <div class="category-header">
                        <h2 class="category-title">Specialz Ingredients</h2>
                        <i class="fas fa-edit edit-icon"></i>
                    </div>
                    <div class="item-list" id="specialsItemList">
                        <!-- Specialz items will be dynamically loaded here -->
                    </div>
                </div>

                <div class="category-card" id="filletzCategory">
                    <div class="category-header">
                        <h2 class="category-title">Filletz Ingredients</h2>
                        <i class="fas fa-edit edit-icon"></i>
                    </div>
                    <div class="item-list" id="filletzItemList">
                        <!-- Filletz items will be dynamically loaded here -->
                    </div>
                </div>

                 <div class="category-card" id="milkshakesCategory">
                    <div class="category-header">
                        <h2 class="category-title">Milkshakes of the Week</h2>
                        <i class="fas fa-edit edit-icon"></i>
                    </div>
                    <div class="item-list" id="milkshakesItemList">
                        <!-- Milkshakes of the Week items will be dynamically loaded here -->
                    </div>
                </div>
            </section>

            <section class="wastage-section">
                <h2 class="section-heading">Wastage</h2>
                <div class="wastage-card">
                    <div class="wastage-input-group">
                        <div class="select-wrapper">
                            <select id="wasteItemSelect" class="waste-select"></select>
                            <i class="fas fa-chevron-down select-arrow"></i>
                        </div>
                         <div class="select-wrapper">
                            <select id="wasteQtySelect" class="waste-select"></select>
                            <i class="fas fa-chevron-down select-arrow"></i>
                        </div>
                        <button id="logWasteBtn" class="log-waste-button">
                            <i class="fas fa-trash-alt trash-icon"></i>
                        </button>
                    </div>
                    <h3 class="wastage-log-heading">Waste Log (Prev. 7 Days)</h3>
                    <ul class="waste-log-list" id="wasteLogList">
                        <!-- Waste log entries will be dynamically loaded here -->
                    </ul>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
